<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do Not List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background: #0a0a0f;
            color: #f0f0f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .phone {
            width: 340px;
            background: #0a0a0f;
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 24px 60px rgba(0,0,0,0.6);
        }
        .screen {
            background: #0f0f1a;
            border-radius: 30px;
            overflow: hidden;
            height: 720px;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 4px;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-weight: 500;
        }
        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: none;
        }
        .scroll-area::-webkit-scrollbar { display: none; }
        .bottom-nav {
            padding: 10px 20px 14px;
            display: flex;
            justify-content: space-around;
            border-top: 0.5px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            color: rgba(255,255,255,0.2);
            font-size: 10px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }
        .nav-btn.active { color: #a78bfa; }
        .nav-btn i { font-size: 18px; }
        .connect-btn {
            width: 100%;
            padding: 11px 0;
            border-radius: 10px;
            background: #4285f4;
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .connect-btn:hover { background: #3b78e7; }
        .card {
            background: rgba(255,255,255,0.03);
            border: 0.5px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px;
        }
        .section-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.2);
            padding: 0 4px;
            margin-bottom: 8px;
        }
        .hidden { display: none; }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <span>9:41</span>
                <span><i class="ti ti-wifi"></i> <i class="ti ti-battery"></i></span>
            </div>

            <!-- 연동 화면 -->
            <div id="sync-screen">
                <div style="padding: 8px 20px 12px;">
                    <div style="font-size:10px;font-weight:500;letter-spacing:0.08em;color:rgba(167,139,250,0.6);margin-bottom:6px;">캘린더 연동</div>
                    <div style="font-size:18px;font-weight:700;color:#f0f0f8;line-height:1.3;">일정을 불러와<br>To-Do-Not을 만들어요</div>
                </div>
                <div class="scroll-area">
                    <!-- 구글 연결 카드 -->
                    <div class="card" id="google-card">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                            <div style="width:40px;height:40px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;">
                                <span style="color:#4285f4;">G</span>
                            </div>
                            <div style="flex:1;">
                                <div style="font-size:13px;font-weight:600;">Google Calendar</div>
                                <div id="connect-status" style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;">연결되지 않음</div>
                            </div>
                        </div>
                        <a href="/login" class="connect-btn" style="text-decoration:none;">
                            <i class="ti ti-brand-google" style="font-size:14px;"></i>
                            Google 계정으로 연결
                        </a>
                    </div>

                    <!-- 권한 안내 -->
                    <div class="card" style="padding:10px 12px;">
                        <div style="font-size:10px;font-weight:500;color:rgba(255,255,255,0.25);margin-bottom:8px;">요청 권한</div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                            <i class="ti ti-calendar" style="font-size:13px;color:rgba(255,255,255,0.25);"></i>
                            <span style="font-size:11px;color:rgba(255,255,255,0.35);">캘린더 일정 읽기 (읽기 전용)</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                            <i class="ti ti-lock" style="font-size:13px;color:rgba(255,255,255,0.25);"></i>
                            <span style="font-size:11px;color:rgba(255,255,255,0.35);">일정 수정·삭제 권한 없음</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <i class="ti ti-shield" style="font-size:13px;color:rgba(255,255,255,0.25);"></i>
                            <span style="font-size:11px;color:rgba(255,255,255,0.35);">데이터는 기기 내에서만 처리</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오늘 화면 (일정 연동 후 표시) -->
            <div id="today-screen" class="hidden">
                <div style="padding:8px 20px 12px;">
                    <div style="font-size:10px;font-weight:500;letter-spacing:0.08em;color:rgba(167,139,250,0.6);margin-bottom:6px;">TO-DO-NOT LIST</div>
                    <div style="font-size:18px;font-weight:700;color:#f0f0f8;line-height:1.3;">분석 중...</div>
                </div>
                <div class="scroll-area">
                    <div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:40px 0;">
                        <div class="spinner"></div>
                        <span style="font-size:12px;color:rgba(255,255,255,0.4);">Upstage AI가 분석하고 있어요...</span>
                    </div>
                    <div id="result-area"></div>
                </div>
            </div>

            <!-- Bottom Nav -->
            <div class="bottom-nav">
                <button class="nav-btn active" onclick="showTab('sync')" id="nav-sync">
                    <i class="ti ti-brand-google"></i><span>연동</span>
                </button>
                <button class="nav-btn" onclick="showTab('today')" id="nav-today">
                    <i class="ti ti-calendar-event"></i><span>오늘</span>
                </button>
                <button class="nav-btn" onclick="showTab('profile')" id="nav-profile">
                    <i class="ti ti-user"></i><span>내 성향</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('sync-screen').classList.add('hidden');
            document.getElementById('today-screen').classList.add('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tab}-screen`)?.classList.remove('hidden');
            document.getElementById(`nav-${tab}`)?.classList.add('active');
        }
    </script>
</body>
</html>
